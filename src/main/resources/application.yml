server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: btcmarket
  datasource:
    url: jdbc:h2:mem:btcmarket;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

app:
  jwt:
    secret: ZGVtb19zZWNyZXRfa2V5X2Zvcl9idGNtYXJrZXRfcHJlZGljdGlvbl9wbGF0Zm9ybV8yMDI2
    access-token-expire-minutes: 720
  market:
    platform-fee-rate: 0.02
    min-bet: 1
    max-bet: 100000
    create-ahead-minutes: 10
  price:
    source: binance
    fetch-interval-ms: 3000
    fallback-simulated: true

logging:
  level:
    com.lazybeartoby.btcmarket: INFO
